<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Ring Hunt 💍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    min-height: 100vh;
    width: 100vw;
    background: radial-gradient(circle at 50% 10%, #fffdf4 0%, #f7eebc 100%);
    font-family: 'Montserrat', sans-serif;
    color: #4a3b32;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}

.container {
    width: 100%;
    max-width: 500px;
    z-index: 10;
}

.section-panel {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 40px 25px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 15px 35px rgba(74, 59, 50, 0.05);
    text-align: center;
}

.section-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #b18e40;
    margin-bottom: 15px;
}

.final-question {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-style: italic;
    color: #261c17;
    line-height: 1.4;
    margin-bottom: 15px;
}

p {
    font-size: 0.95rem;
    line-height: 1.8;
    color: #5d4b40;
    font-weight: 300;
    margin-bottom: 30px;
}

.response-btn {
    padding: 12px 35px;
    border: 1px solid #261c17;
    background: transparent;
    border-radius: 30px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #261c17;
    cursor: pointer;
    /* Removed transition to make it teleport INSTANTLY without lag */
    position: relative;
}

.firework-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
}

@keyframes explode {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--mx), var(--my)) scale(0.3); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <div class="section-panel">
        <div class="section-label">✨ Next Level Unlocked ✨</div>
        <h2 class="final-question">The Ring Hunt 💍</h2>
        <p>
            Since you said yes to forever, there's just one final thing left to do. Catch the button below to claim your ring!
        </p>
        
        <!-- Runaway target button -->
        <button id="runawayBtn" class="response-btn" style="background: #261c17; color: #f7eebc; z-index: 999; white-space: nowrap;">
            Find My Ring 💍
        </button>

        <button class="response-btn" style="margin-top: 25px; display: block; width: 100%; font-size: 0.7rem; opacity: 0.5; border: none; background: transparent;" onclick="alert('Look right next to you! The real ring is waiting for you offline ❤️💍')">
            I give up, just give me a hint 🤷
        </button>
    </div>
</div>

<script>
// --- Pure CSS Firecracker Explosion Engine ---
function launchFirework(originX, originY) {
    const colors = ['#b18e40', '#ff6b6b', '#ffd166', '#4ecdc4', '#f7eebc', '#ff8787'];
    const particleCount = 40;

    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'firework-particle';
        particle.style.left = originX + 'px';
        particle.style.top = originY + 'px';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 130;
        const moveX = Math.cos(angle) * velocity;
        const moveY = Math.sin(angle) * velocity;
        
        particle.style.setProperty('--mx', `${moveX}px`);
        particle.style.setProperty('--my', `${moveY}px`);
        particle.style.animation = `explode ${0.8 + Math.random() * 0.8}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
        
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 1600);
    }
}

// Automatic firecracker bursts on load
setTimeout(() => launchFirework(window.innerWidth * 0.2, window.innerHeight * 0.25), 200);
setTimeout(() => launchFirework(window.innerWidth * 0.8, window.innerHeight * 0.20), 500);
setTimeout(() => launchFirework(window.innerWidth * 0.3, window.innerHeight * 0.75), 900);
setTimeout(() => launchFirework(window.innerWidth * 0.75, window.innerHeight * 0.80), 1200);

// --- LEVEL UP: Uncatchable Runaway Button Logic ---
const btn = document.getElementById('runawayBtn');

function moveButton(e) {
    if (e) e.preventDefault();
    
    // Increased the boundary range so it jumps completely out of reach across the screen
    const randomX = Math.floor((Math.random() - 0.5) * 260); 
    const randomY = Math.floor((Math.random() - 0.5) * 240);
    
    btn.style.transform = `translate(${randomX}px, ${randomY}px)`;
}

// Triggers instantly the absolute millisecond a finger even approaches or skims it
btn.addEventListener('touchstart', moveButton);
btn.addEventListener('pointerdown', moveButton);
btn.addEventListener('mouseover', moveButton);

// If she somehow uses reality-bending speed to click it:
btn.addEventListener('click', function() {
    alert("Look right next to you! Your real ring is waiting for you offline ❤️💍");
});
</script>

</body>
</html>
